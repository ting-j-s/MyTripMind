<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMind - 智能旅游推荐系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/icons.js"></script>
    <style>
        /* 欢迎页全屏设计 */
        .welcome-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #2D5A27 0%, #1A3A18 50%, #0D1F0C 100%);
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        .welcome-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        /* 顶部导航 */
        .welcome-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .welcome-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .welcome-logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .welcome-logo-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .welcome-auth {
            display: flex;
            gap: 12px;
        }

        .btn-auth {
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-auth-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .btn-auth-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
        }

        .btn-auth-solid {
            background: white;
            color: var(--primary);
            border: none;
        }

        .btn-auth-solid:hover {
            background: rgba(255,255,255,0.9);
            transform: translateY(-2px);
        }

        /* 中央内容 */
        .welcome-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        .welcome-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 100px;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 32px;
        }

        .welcome-title {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -3px;
            color: white;
            margin-bottom: 24px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .welcome-title span {
            color: #8BC34A;
            display: block;
        }

        .welcome-desc {
            font-size: 20px;
            color: rgba(255,255,255,0.8);
            max-width: 600px;
            margin: 0 auto 48px;
            line-height: 1.8;
        }

        /* 主按钮 */
        .welcome-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .btn-enter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 48px;
            background: white;
            color: var(--primary);
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .btn-enter:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        .btn-enter svg {
            transition: transform 0.2s;
        }

        .btn-enter:hover svg {
            transform: translateX(4px);
        }

        /* 功能亮点 */
        .welcome-features {
            display: flex;
            gap: 48px;
            margin-top: 64px;
        }

        .welcome-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .welcome-feature-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8BC34A;
        }

        /* 底部提示 */
        .welcome-footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .welcome-nav {
                padding: 20px 24px;
            }

            .welcome-title {
                font-size: 42px;
                letter-spacing: -1px;
            }

            .welcome-desc {
                font-size: 16px;
            }

            .welcome-features {
                flex-direction: column;
                gap: 16px;
                align-items: center;
            }

            .btn-enter {
                padding: 16px 36px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-page">
        <!-- 顶部导航 -->
        <div class="welcome-nav">
            <div class="welcome-logo">
                <div class="welcome-logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
                </div>
                <span class="welcome-logo-text">TripMind</span>
            </div>

            <div class="welcome-auth">
                <a href="login.html" class="btn-auth btn-auth-outline">登录</a>
                <a href="register.html" class="btn-auth btn-auth-solid">注册</a>
            </div>
        </div>

        <!-- 中央内容 -->
        <div class="welcome-content">
            <div class="welcome-badge">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
                发现慢生活的节奏
            </div>

            <h1 class="welcome-title">
                漫步北京，
                <span>随心</span>而行
            </h1>

            <p class="welcome-desc">
                厌倦了机械的打卡？TripMind 深度算法为您编排最舒适的漫游路线，在胡同与宫殿间寻找内心的宁静。
            </p>

            <div class="welcome-actions">
                <a href="pages/home.html" class="btn-enter">
                    开始探索
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                </a>
            </div>

            <div class="welcome-features">
                <div class="welcome-feature">
                    <div class="welcome-feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
                    </div>
                    智能路线规划
                </div>
                <div class="welcome-feature">
                    <div class="welcome-feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                    </div>
                    TSP多景点游览
                </div>
                <div class="welcome-feature">
                    <div class="welcome-feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                    智能搜索推荐
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="welcome-footer">
            © 2026 TripMind | 数据结构课程设计
        </div>
    </div>
</body>
</html>
