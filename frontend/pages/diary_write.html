<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写日记 - TripMind</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/icons.js"></script>
    <style>
        .write-page {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            padding: 100px 24px 60px;
        }

        .write-card {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .write-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .write-header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-primary);
        }

        .write-header p {
            color: var(--text-muted);
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.1);
        }

        .form-textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.7;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .form-actions .btn {
            flex: 1;
            padding: 16px;
            font-size: 15px;
            border-radius: 14px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" style="background: transparent; border-bottom-color: rgba(255,255,255,0.1);">
        <div class="navbar-inner">
            <div class="logo" onclick="location.href='../index.html'">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
                </div>
                <span class="logo-text" style="color: white;">TripMind</span>
            </div>

            <div class="nav-tabs" style="background: rgba(255,255,255,0.1);">
                <a href="home.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    探索
                </a>
                <a href="route_planning.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
                    规划
                </a>
                <a href="diary_square.html" class="nav-tab active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                    游记
                </a>
                <a href="food.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
                    食集
                </a>
            </div>

            <div class="user-area">
                <a href="../login.html" class="btn-signin" style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);">Sign In</a>
            </div>
        </div>
    </nav>

    <!-- 写日记 -->
    <div class="write-page">
        <div class="write-card">
            <div class="write-header">
                <h1>✏️ 写旅游日记</h1>
                <p>记录你的精彩旅行故事</p>
            </div>

            <form id="diaryForm">
                <div class="form-group">
                    <label class="form-label">标题 *</label>
                    <input type="text" id="title" class="form-input" required placeholder="给日记起个吸引人的标题">
                </div>

                <div class="form-group">
                    <label class="form-label">关联景点</label>
                    <select id="location" class="form-select">
                        <option value="">-- 选择景点（可选） --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">日记内容 *</label>
                    <textarea id="content" class="form-textarea" required placeholder="记录你的旅行经历、感受、攻略心得..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">图片链接（可选，多个用逗号分隔）</label>
                    <input type="text" id="images" class="form-input" placeholder="https://example.com/image1.jpg, https://example.com/image2.jpg">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">取消</button>
                    <button type="submit" class="btn btn-primary">发布日记</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // 检查登录
        function checkLogin() {
            const user = API.Auth.getCurrentUser();
            if (!user) {
                alert('请先登录');
                window.location.href = '../login.html';
                return null;
            }
            return user;
        }

        // 加载景点选项
        async function loadAttractions() {
            try {
                const data = await API.Attractions.list({ limit: 100 });
                const select = document.getElementById('location');

                if (data && data.items) {
                    data.items.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = `${item.name} (${item.type || '景点'})`;
                        select.appendChild(option);
                    });
                }
            } catch (e) {
                console.log('加载景点失败:', e);
            }
        }

        // 提交日记
        document.getElementById('diaryForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const user = checkLogin();
            if (!user) return;

            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const location = document.getElementById('location').value;
            const imagesInput = document.getElementById('images').value.trim();

            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }

            const images = imagesInput ? imagesInput.split(',').map(s => s.trim()).filter(s => s) : [];

            try {
                const data = await API.Diaries.create({
                    user_id: user.user_id,
                    title: title,
                    content: content,
                    location_id: location || null,
                    images: images
                });

                if (data && data.diary_id) {
                    alert('发布成功！');
                    window.location.href = 'diary_detail.html?id=' + data.diary_id;
                }
            } catch (e) {
                alert('发布失败，请重试');
            }
        });

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            loadAttractions();
        });
    </script>
</body>
</html>
