<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食推荐 - TripMind</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/icons.js"></script>
    <style>
        .food-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .food-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid var(--border);
        }

        .food-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .food-image {
            height: 140px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .food-content {
            padding: 16px;
        }

        .food-name {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .food-restaurant {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .food-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .food-tag {
            padding: 4px 10px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        @media (max-width: 1024px) {
            .food-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .food-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" style="background: rgba(45, 90, 39, 0.95); border-bottom-color: rgba(255,255,255,0.1);">
        <div class="navbar-inner">
            <div class="logo" onclick="location.href='../index.html'">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
                </div>
                <span class="logo-text" style="color: white;">TripMind</span>
            </div>

            <div class="nav-tabs" style="background: rgba(255,255,255,0.1);">
                <a href="home.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    探索
                </a>
                <a href="route_planning.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
                    规划
                </a>
                <a href="diary_square.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                    游记
                </a>
                <a href="food.html" class="nav-tab active" style="color: white;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
                    食集
                </a>
            </div>

            <div class="user-area">
                <a href="../login.html" class="btn-signin" style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);">Sign In</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content page-bg-gradient">
        <section class="hero" style="padding: 60px 0 40px;">
            <div class="container">
                <h1 style="font-size: 32px; margin-bottom: 8px;">🍜 美食推荐</h1>
                <p style="color: var(--text-secondary);">Discover the best local flavors</p>
            </div>
        </section>

        <section class="section" style="padding-top: 0;">
            <div class="container">
                <!-- 搜索 -->
                <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                    <input type="text" id="searchInput" class="form-input" placeholder="搜索美食、菜系、餐厅..." style="flex: 1;">
                    <button class="btn btn-primary" onclick="searchFoods()" style="padding: 14px 24px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </button>
                </div>

                <!-- 菜系筛选 -->
                <div class="filter-bar" id="cuisineFilters">
                    <button class="filter-btn active" onclick="filterByCuisine('')">全部</button>
                    <button class="filter-btn" onclick="filterByCuisine('川菜')">川菜</button>
                    <button class="filter-btn" onclick="filterByCuisine('粤菜')">粤菜</button>
                    <button class="filter-btn" onclick="filterByCuisine('火锅')">火锅</button>
                    <button class="filter-btn" onclick="filterByCuisine('京菜')">京菜</button>
                    <button class="filter-btn" onclick="filterByCuisine('小吃')">小吃</button>
                    <button class="filter-btn" onclick="filterByCuisine('西餐')">西餐</button>
                    <button class="filter-btn" onclick="filterByCuisine('日料')">日料</button>
                </div>

                <!-- 排序 -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
                    <select id="sortSelect" onchange="loadFoods()" class="form-input" style="width: auto;">
                        <option value="heat">按热度</option>
                        <option value="rating">按评分</option>
                    </select>
                </div>

                <!-- 美食列表 -->
                <div class="food-grid" id="foodList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 TripMind | 数据结构课程设计</p>
    </footer>

    <script src="../js/api.js"></script>
    <script>
        // 检查登录状态
        function checkLogin() {
            const user = API.Auth.getCurrentUser();
            const userArea = document.getElementById('userArea');
            if (user && userArea) {
                userArea.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="color: var(--text-secondary);">欢迎，${user.username}</span>
                        <button onclick="logout()" class="btn" style="padding: 8px 16px; background: var(--primary-light); color: var(--primary);">退出</button>
                    </div>
                `;
            }
        }

        function logout() {
            API.Auth.logout();
            location.reload();
        }

        let currentCuisine = '';

        // 按菜系筛选
        function filterByCuisine(cuisine) {
            currentCuisine = cuisine;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (cuisine || '全部')) {
                    btn.classList.add('active');
                }
            });
            loadFoods();
        }

        // 加载美食列表
        async function loadFoods() {
            const sort = document.getElementById('sortSelect').value;
            const params = {
                campus_id: 'BJ',
                sort: sort,
                limit: 30
            };
            if (currentCuisine) {
                params.cuisine = currentCuisine;
            }

            const container = document.getElementById('foodList');

            try {
                const data = await API.Foods.list(params);
                if (data && data.items && data.items.length > 0) {
                    renderFoods(container, data.items);
                } else {
                    renderMockFoods(container);
                }
            } catch (e) {
                renderMockFoods(container);
            }
        }

        // 搜索美食
        async function searchFoods() {
            const keyword = document.getElementById('searchInput').value.trim();
            const container = document.getElementById('foodList');

            if (!keyword) {
                loadFoods();
                return;
            }

            try {
                const data = await API.Foods.search(keyword, { campus_id: 'BJ' });
                if (data && data.items && data.items.length > 0) {
                    renderFoods(container, data.items);
                } else {
                    container.innerHTML = '<div class="empty">未找到相关美食</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="empty">搜索失败</div>';
            }
        }

        // 渲染美食卡片
        function renderFoods(container, items) {
            const foodEmojis = ['🍜', '🍲', '🥘', '🍛', '🍝', '🥗', '🍱', '🥟', '🍕', '🍖'];

            container.innerHTML = items.map((item, i) => `
                <div class="food-card">
                    <div class="food-image">
                        ${foodEmojis[i % foodEmojis.length]}
                    </div>
                    <div class="food-content">
                        <div class="food-name">${item.name}</div>
                        <div class="food-restaurant">${item.restaurant || ''}</div>
                        <div class="food-meta">
                            <span class="food-tag">${item.cuisine || '其他'}</span>
                            <span style="color: var(--accent); font-weight: 700;">
                                ⭐ ${item.rating || '4.5'}
                            </span>
                            <span style="color: var(--text-muted); font-size: 12px;">
                                🔥 ${item.heat || 0}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 模拟美食数据
        function renderMockFoods(container) {
            const mockFoods = [
                { name: '北京烤鸭', restaurant: '全聚德', cuisine: '京菜', rating: 4.8, heat: 5000 },
                { name: '炸酱面', restaurant: '海碗居', cuisine: '京菜', rating: 4.5, heat: 3500 },
                { name: '宫保鸡丁', restaurant: '川菜馆', cuisine: '川菜', rating: 4.5, heat: 4000 },
                { name: '麻婆豆腐', restaurant: '川菜馆', cuisine: '川菜', rating: 4.5, heat: 3500 },
                { name: '水煮鱼', restaurant: '沸腾鱼乡', cuisine: '川菜', rating: 4.6, heat: 3800 },
                { name: '白切鸡', restaurant: '粤菜馆', cuisine: '粤菜', rating: 4.5, heat: 2500 },
                { name: '虾饺', restaurant: '点心王子', cuisine: '粤菜', rating: 4.6, heat: 3000 },
                { name: '铜锅涮肉', restaurant: '东来顺', cuisine: '火锅', rating: 4.7, heat: 4200 },
                { name: '重庆火锅', restaurant: '海底捞', cuisine: '火锅', rating: 4.8, heat: 5000 },
            ];

            renderFoods(container, mockFoods);
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            loadFoods();
        });
    </script>
</body>
</html>
