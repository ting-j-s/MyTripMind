<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多景点游览 - TripMind</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/icons.js"></script>
    <script src="../js/api.js"></script>
    <style>
        .page-container {
            display: flex;
            height: calc(100vh - 72px);
        }

        .spots-panel {
            width: 400px;
            background: rgba(255,255,255,0.95);
            border-right: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
        }

        .spots-panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .spots-panel-header h2 {
            font-size: 22px;
            font-weight: 900;
        }

        .spots-panel-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .spots-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .spot-add {
            margin-bottom: 24px;
        }

        .spot-add input {
            width: 100%;
        }

        .selected-spots {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .selected-spot {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.2s;
        }

        .selected-spot:hover {
            border-color: var(--primary-light);
        }

        .selected-spot .order {
            width: 28px;
            height: 28px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
        }

        .selected-spot .info {
            flex: 1;
        }

        .selected-spot .name {
            font-weight: 700;
            font-size: 14px;
        }

        .selected-spot .type {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .selected-spot .remove {
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }

        .selected-spot .remove:hover {
            color: #EF4444;
        }

        .empty-spots {
            padding: 48px 24px;
            border: 2px dashed var(--border);
            border-radius: 20px;
            text-align: center;
        }

        .empty-spots-icon {
            width: 64px;
            height: 64px;
            background: var(--bg-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: var(--text-muted);
        }

        .spots-panel-footer {
            padding: 20px 24px;
            background: var(--bg-main);
            border-top: 1px solid var(--border);
        }

        .btn-plan {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-plan:hover:not(:disabled) {
            opacity: 0.9;
        }

        .btn-plan:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-plan.loading {
            background: var(--primary-light);
            color: var(--primary);
        }

        .result-section {
            margin-top: 16px;
        }

        .result-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .result-card h4 {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .result-stats {
            display: flex;
            gap: 16px;
        }

        .result-stat {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--bg-main);
            border-radius: 10px;
        }

        .result-stat .value {
            font-size: 20px;
            font-weight: 900;
            color: var(--primary);
        }

        .result-stat .label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-order {
            margin-top: 12px;
        }

        .result-order-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .result-order-item:last-child {
            border-bottom: none;
        }

        .result-order-item .num {
            width: 24px;
            height: 24px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
        }

        .result-order-item .arrow {
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" style="background: rgba(45, 90, 39, 0.95); border-bottom-color: rgba(255,255,255,0.1);">
        <div class="navbar-inner">
            <div class="logo" onclick="location.href='../index.html'">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
                </div>
                <span class="logo-text" style="color: white;">TripMind</span>
            </div>

            <div class="nav-tabs" style="background: rgba(255,255,255,0.1);">
                <a href="home.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    探索
                </a>
                <a href="route_planning.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
                    规划
                </a>
                <a href="trip_planning.html" class="nav-tab active" style="color: white;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                    多景点
                </a>
                <a href="diary_square.html" class="nav-tab" style="color: rgba(255,255,255,0.7);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                    游记
                </a>
            </div>

            <div class="user-area" id="userArea">
                <a href="../login.html" class="btn-signin" style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);">Sign In</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="page-container">
        <!-- 左侧景点选择面板 -->
        <div class="spots-panel">
            <div class="spots-panel-header">
                <h2>多景点游览规划</h2>
                <p>选择多个景点，智能规划最优游览顺序</p>
            </div>

            <div class="spots-panel-body">
                <!-- 添加景点 -->
                <div class="spot-add">
                    <select id="spotSelect" class="form-input">
                        <option value="">添加景点...</option>
                    </select>
                    <button class="btn btn-primary" onclick="addSpot()" style="width: 100%; margin-top: 8px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        添加到列表
                    </button>
                </div>

                <!-- 已选景点 -->
                <div class="selected-spots" id="selectedSpots">
                    <div class="empty-spots">
                        <div class="empty-spots-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        </div>
                        <p>添加景点以开始规划</p>
                    </div>
                </div>

                <!-- 结果展示 -->
                <div id="resultSection" class="result-section" style="display: none;">
                    <div class="result-card">
                        <h4>TSP优化结果</h4>
                        <div class="result-stats">
                            <div class="result-stat">
                                <div class="value" id="totalDistance">-</div>
                                <div class="label">总距离(km)</div>
                            </div>
                            <div class="result-stat">
                                <div class="value" id="totalTime">-</div>
                                <div class="label">预计时间(分钟)</div>
                            </div>
                        </div>
                        <div class="result-order" id="resultOrder"></div>
                    </div>
                </div>
            </div>

            <div class="spots-panel-footer">
                <button id="planBtn" class="btn-plan" onclick="calculateTSP()" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                    计算最优路线
                </button>
                <div style="display: flex; gap: 8px; margin-top: 12px;">
                    <button class="btn" onclick="clearAll()" style="flex: 1; background: var(--bg-main); padding: 10px;">
                        清空
                    </button>
                    <button class="btn btn-primary" onclick="startNavigation()" style="flex: 1; padding: 10px;">
                        开始导航
                    </button>
                </div>
            </div>
        </div>

        <!-- 右侧地图区域 -->
        <div class="planning-map">
            <div class="planning-map-grid"></div>
            <div class="planning-map-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
            </div>

            <div class="planning-map-status">
                <div class="planning-map-status-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                </div>
                <div class="planning-map-status-text">
                    <p>TSP 算法</p>
                    <p>已就绪</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        function checkLogin() {
            const user = API.Auth.getCurrentUser();
            const userArea = document.getElementById('userArea');
            if (user && userArea) {
                userArea.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="color: var(--text-secondary);">欢迎，${user.username}</span>
                        <button onclick="logout()" class="btn" style="padding: 8px 16px; background: var(--primary-light); color: var(--primary);">退出</button>
                    </div>
                `;
            }
        }

        function logout() {
            API.Auth.logout();
            location.reload();
        }

        // 状态
        let allAttractions = [];
        let selectedSpots = [];

        // 加载景点数据
        async function loadAttractions() {
            try {
                const data = await API.Attractions.list({ limit: 100 });
                if (data && data.items) {
                    allAttractions = data.items;
                } else {
                    allAttractions = getMockAttractions();
                }
            } catch (e) {
                allAttractions = getMockAttractions();
            }

            populateSelect();
        }

        function getMockAttractions() {
            return [
                { id: 'ATTR_BJ_001', name: '故宫博物院', type: '历史古迹' },
                { id: 'ATTR_BJ_003', name: '天坛', type: '公园景观' },
                { id: 'ATTR_BJ_004', name: '颐和园', type: '皇家园林' },
                { id: 'ATTR_BJ_006', name: '八达岭长城', type: '历史古迹' },
                { id: 'ATTR_BJ_008', name: '北京大学', type: '高校' },
                { id: 'ATTR_BJ_009', name: '清华大学', type: '高校' },
                { id: 'ATTR_BJ_017', name: '国家博物馆', type: '博物馆' },
                { id: 'ATTR_BJ_033', name: '南锣鼓巷', type: '特色街道' },
                { id: 'ATTR_BJ_048', name: '鸟巢', type: '体育场馆' },
            ];
        }

        function populateSelect() {
            const select = document.getElementById('spotSelect');
            const options = allAttractions.map(a =>
                `<option value="${a.id}">${a.name}</option>`
            ).join('');
            select.innerHTML = '<option value="">添加景点...</option>' + options;
        }

        // 添加景点
        function addSpot() {
            const select = document.getElementById('spotSelect');
            const id = select.value;

            if (!id) {
                alert('请选择景点');
                return;
            }

            if (selectedSpots.find(s => s.id === id)) {
                alert('该景点已在列表中');
                return;
            }

            if (selectedSpots.length >= 10) {
                alert('最多添加10个景点');
                return;
            }

            const attraction = allAttractions.find(a => a.id === id);
            selectedSpots.push(attraction);
            select.value = '';

            renderSelectedSpots();
            updatePlanBtn();
        }

        // 移除景点
        function removeSpot(id) {
            selectedSpots = selectedSpots.filter(s => s.id !== id);
            renderSelectedSpots();
            updatePlanBtn();
        }

        // 渲染已选景点
        function renderSelectedSpots() {
            const container = document.getElementById('selectedSpots');

            if (selectedSpots.length === 0) {
                container.innerHTML = `
                    <div class="empty-spots">
                        <div class="empty-spots-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        </div>
                        <p>添加景点以开始规划</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = selectedSpots.map((spot, i) => `
                <div class="selected-spot">
                    <div class="order">${i + 1}</div>
                    <div class="info">
                        <div class="name">${spot.name}</div>
                        <div class="type">${spot.type}</div>
                    </div>
                    <div class="remove" onclick="removeSpot('${spot.id}')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </div>
                </div>
            `).join('');
        }

        // 更新计划按钮状态
        function updatePlanBtn() {
            const btn = document.getElementById('planBtn');
            btn.disabled = selectedSpots.length < 2;
        }

        // 清空
        function clearAll() {
            selectedSpots = [];
            renderSelectedSpots();
            updatePlanBtn();
            document.getElementById('resultSection').style.display = 'none';
        }

        // 计算TSP
        async function calculateTSP() {
            if (selectedSpots.length < 2) {
                alert('至少需要2个景点');
                return;
            }

            const btn = document.getElementById('planBtn');
            btn.classList.add('loading');
            btn.innerHTML = `
                <svg class="spin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                计算中...
            `;

            try {
                // 使用第一个景点作为起点
                const startId = selectedSpots[0].id;
                // 其余景点作为目标
                const nodeIds = selectedSpots.slice(1).map(s => s.id);

                const result = await API.Routes.tsp(startId, nodeIds, {
                    transport: '步行',
                    optimize: true
                });

                if (result) {
                    // 使用后端返回的优化顺序
                    const totalDist = (result.total_distance / 1000).toFixed(1);
                    const totalTime = Math.round(result.total_time / 60);

                    document.getElementById('totalDistance').textContent = totalDist;
                    document.getElementById('totalTime').textContent = totalTime;

                    // 使用后端返回的景点名称顺序
                    const orderContainer = document.getElementById('resultOrder');
                    const visitedNames = result.visited_names || selectedSpots.map(s => s.name);

                    orderContainer.innerHTML = visitedNames.map((name, i) => `
                        <div class="result-order-item">
                            <div class="num">${i + 1}</div>
                            <div class="name">${name}</div>
                            ${i < visitedNames.length - 1 ? '<div class="arrow"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></div>' : ''}
                        </div>
                    `).join('');

                    document.getElementById('resultSection').style.display = 'block';
                } else {
                    showMockResult();
                }
            } catch (e) {
                console.error('TSP计算失败:', e);
                showMockResult();
            }

            btn.classList.remove('loading');
            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                重新计算
            `;
        }

        // 显示模拟结果（后端未启动时）
        function showMockResult() {
            const totalDist = (Math.random() * 20 + 10).toFixed(1);
            const totalTime = Math.round(totalDist / 5 * 60);

            document.getElementById('totalDistance').textContent = totalDist;
            document.getElementById('totalTime').textContent = totalTime;

            const orderContainer = document.getElementById('resultOrder');
            orderContainer.innerHTML = selectedSpots.map((spot, i) => `
                <div class="result-order-item">
                    <div class="num">${i + 1}</div>
                    <div class="name">${spot.name}</div>
                    ${i < selectedSpots.length - 1 ? '<div class="arrow"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></div>' : ''}
                </div>
            `).join('');

            document.getElementById('resultSection').style.display = 'block';
        }

        // 开始导航
        function startNavigation() {
            if (selectedSpots.length < 2) {
                alert('至少需要2个景点');
                return;
            }

            const first = selectedSpots[0];
            const last = selectedSpots[selectedSpots.length - 1];
            location.href = `route_planning.html?from=${first.id}&to=${last.id}`;
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
            loadAttractions();
        });
    </script>
</body>
</html>
